services:
  - type: web
    name: transcriptai
    runtime: python
    plan: free
    healthCheckPath: /
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn python_server_optimized:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TRANSCRIPTION_MODEL
        value: openai/gpt-audio-mini
      - key: ANALYSIS_MODEL
        value: openai/gpt-4.1-mini
